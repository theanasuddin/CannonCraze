name: Bug report
description: Something is broken or behaves unexpectedly
title: "[Bug] "
labels: [bug]
body:
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - macOS
        - Linux
        - Android
        - Running from source (Processing IDE / CLI)
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Game version or commit
      placeholder: "v1.0.0, or the commit hash if built from source"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what did you see instead? Screenshots or a short clip help a lot.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the game
        2. Resize the window while aiming
        3. ...
    validations:
      required: true
  - type: textarea
    id: console
    attributes:
      label: Console output
      description: Any errors printed to the console (or logcat on Android), if you have them.
      render: text
